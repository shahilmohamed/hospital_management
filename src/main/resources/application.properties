spring.application.name=hospitalReport

# Server port - Railway sets PORT environment variable
server.port=${PORT ? PORT : 8080}

spring.datasource.url=${MYSQL_PUBLIC_URL?MYSQL_PUBLIC_URL:jdbc:mysql://localhost:3306/hospital}
spring.datasource.username=${MYSQLUSER?MYSQLUSER:root}
spring.datasource.password=${MYSQLPASSWORD?MYSQLPASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Connection pool settings for production
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=20000

# JPA/Hibernate configuration
spring.jpa.hibernate.ddl-auto=${HIBERNATE_DDL_AUTO ? HIBERNATE_DDL_AUTO : update}
spring.jpa.show-sql=${SHOW_SQL ? SHOW_SQL : true}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
spring.jpa.properties.hibernate.format_sql=false

# JWT Secret - should be set as environment variable in Railway (generate a secure random string)
jwt.secret=${JWT_SECRET ? JWT_SECRET : 9ae48cf8c8f646daac2f8992ab2710ef1234567890abcdef1234567890abcd}

# CORS configuration - set allowed origins for your frontend (comma-separated for multiple origins)
cors.allowed.origins=${CORS_ALLOWED_ORIGINS ? CORS_ALLOWED_ORIGINS : http://localhost:4200,https://shahil-hospital-management.netlify.app,https://subha-hospital.netlify.app}
